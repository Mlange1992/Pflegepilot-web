name: PflegePilot
options:
  bundleIdPrefix: de.pflegepilot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # iPhone-only — verhindert iPad-Orientations-Warning
    TARGETED_DEVICE_FAMILY: "1"
    # Xcode 26 "Update to recommended settings"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

targets:
  PflegePilot:
    type: application
    platform: iOS
    sources:
      - path: PflegePilot
        excludes:
          # Wird über `entitlements: path:` referenziert — sonst doppelte Behandlung
          # ("Entitlements file was modified during the build")
          - "PflegePilot.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.pflegepilot.app
        INFOPLIST_FILE: PflegePilot/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
      - sdk: AuthenticationServices.framework
      - sdk: UserNotifications.framework
    entitlements:
      path: PflegePilot/PflegePilot.entitlements
    # TODO: Capabilities aktivieren sobald paid Developer Account ($99/Jahr) vorhanden:
    # capabilities:
    #   com.apple.InAppPurchase: {}
    #   com.apple.developer.applesignin: {}
    info:
      path: PflegePilot/Info.plist
      properties:
        CFBundleDisplayName: PflegePilot
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: "Für schnellen Zugriff auf Ihr Budget-Dashboard"
        CFBundleURLTypes:
          - CFBundleURLName: de.pflegepilot.app
            CFBundleURLSchemes:
              - pflegepilot
